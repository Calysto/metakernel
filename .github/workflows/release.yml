name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        # See https://python-poetry.org/docs/cli/#version for a description of version types.
        description: "Version to release: a version number (e.g. 1.0.0rc4) or one of: patch, minor, major, prepatch, preminor, premajor, prerelease"
        required: true
        type: string
      dry_run:
        description: "Dry run (deletes draft release, does not push changes, does not publish to PyPI"
        required: false
        type: boolean
        default: false
      changelog_body:
        description: "Custom release notes body (supports \\n for newlines)"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 9 * * *"

jobs:
  release:
    if: github.event_name != 'schedule' || github.repository == 'Calysto/metakernel'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      dry_run: ${{ github.event_name == 'schedule' && 'true' || inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - uses: calysto/maintainer_tools/actions/release@v1
        id: release
        with:
          version: ${{ github.event_name == 'schedule' && '10.10.10.10' || inputs.version }}
          dry_run: ${{ github.event_name == 'schedule' && 'true' || inputs.dry_run }}
          changelog_body: ${{ inputs.changelog_body }}
          app_id: ${{ vars.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          ref: ${{ github.ref_name }}

  # Build the package from the release tag so the artifact matches what was released.
  build-package:
    name: Build & verify package
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0

  publish:
    needs: [release, build-package]
    runs-on: ubuntu-latest
    environment: release
    permissions:
        id-token: write
        attestations: write
    steps:
    - name: Download packages built by build-and-inspect-python-package
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: Packages
        path: dist

    - name: Upload package to Test PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: ${{ needs.release.outputs.dry_run }}
        verbose: ${{ needs.release.outputs.dry_run }}

    - name: Upload package to PyPI
      if: ${{ !needs.release.outputs.dry_run }}
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        attestations: false
