name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
    contents: read

jobs:
  build:
    name: Build and Inspect Package
    runs-on: ubuntu-latest
    outputs:
      supported_python_classifiers_json_array: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516  # v2.14.0
        id: baipp

  test:
    name: Test (Python ${{ matrix.python-version }})
    # Delay the test builds so the cover builds get a chance to start first.
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.build.outputs.supported_python_classifiers_json_array) }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
        with:
          python-version: ${{ matrix.python-version }}
      - run: just test -v

  test_sdist:
    name: Test SDist
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - uses: ./.github/actions/test-sdist

  cover:
    name: Cover (${{ matrix.os }}, Python 3.10)
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      OS: ${{ matrix.os }}
      PYTHON: "3.10"

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - name: Install graphviz
        if: runner.os == 'Linux'
        uses: tecolicom/actions-use-apt-tools@065d3fb036b7fc85487573596f97732ed0d3fce1 # v1.7
        with:
          tools: graphviz
      - run: just cover -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
          fail_ci_if_error: false

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - run: just pre-commit --hook-stage=manual
      - run: just docs
      - run: just help
      - name: Test typing
        run: just typing

  test_minimum_versions:
    name: Test Minimum Versions
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - uses: ./.github/actions/test-minimum-versions

  run_notebooks:
    name: Run Notebooks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - run: just run-notebooks

  test_release:
    name: Test Release (Dry Run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - uses: ./.github/actions/release
        with:
          version: patch
          dry_run: "true"
          ref: ${{ github.head_ref }}

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - build
      - test
      - test_sdist
      - cover
      - static
      - test_minimum_versions
      - run_notebooks
      - test_release
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
