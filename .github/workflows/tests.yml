name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Inspect Package
    runs-on: ubuntu-latest
    outputs:
      supported_python_classifiers_json_array: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@v6
      - uses: hynek/build-and-inspect-python-package@v2
        id: baipp

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.build.outputs.supported_python_classifiers_json_array) }}

    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - run: just test -v

  test_sdist:
    name: Test SDist
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7

      - uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - run: |
          mkdir sdist_unpack
          tar xf dist/*.tar.gz --strip-components=1 -C sdist_unpack
        shell: bash

      - run: uv run pytest
        working-directory: sdist_unpack

  cover:
    name: Cover (${{ matrix.os }}, Python 3.10)
    needs: [build]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      OS: ${{ matrix.os }}
      PYTHON: "3.10"

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - run: just cover -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
          fail_ci_if_error: false

  static:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - run: just pre-commit
      - run: just docs
      - run: just help
      - name: Test typing
        run: |
          uv sync
          just typing

  test_minimum_versions:
    name: Test Minimum Versions
    needs: [build]
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - run: just test -v

  link_check:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - uses: jupyterlab/maintainer-tools/.github/actions/check-links@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
        with:
          ignore_links: "http://some/file/from/* http://path/to/some/* http://host* http://nbviewer.ipython.org/*"

  check_release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/base-setup
      - run: pip install -e .
      - uses: jupyter-server/jupyter_releaser/.github/actions/check-release@3e74486d1011d24cd5e9977202fd349dece0db9c # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  run_notebooks:
    name: Run Notebooks
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/base-setup
      - run: just run-notebooks

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - build
      - test
      - test_sdist
      - cover
      - static
      - link_check
      - test_minimum_versions
      - check_release
      - run_notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
