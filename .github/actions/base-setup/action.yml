name: Base Setup
description: Install uv (with OS-keyed cache), just, graphviz (Linux), and project dependencies

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true
        cache-suffix: ${{ runner.os }}

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

    - name: Install graphviz
      if: runner.os == 'Linux'
      uses: tecolicom/actions-use-apt-tools@065d3fb036b7fc85487573596f97732ed0d3fce1 # v1.7
      with:
        tools: graphviz

    - name: Install dependencies
      if: hashFiles('justfile') != ''
      run: just install
      shell: bash
