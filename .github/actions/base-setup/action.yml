name: Base Setup
description: Install Python, Poetry (with OS-keyed cache), just, graphviz (Linux), and project dependencies

inputs:
  python-version:
    required: false
    default: ""
    description: "Python version to use (defaults to minimum version from pyproject.toml)"

runs:
  using: composite
  steps:
    - name: Get default Python version
      id: get-python-version
      if: inputs.python-version == ''
      shell: bash
      run: |
        python3 -c "
        import tomllib, re
        with open('pyproject.toml', 'rb') as f:
            data = tomllib.load(f)
        req = data['project']['requires-python']
        m = re.search(r'[\d.]+', req)
        print('version=' + m.group())
        " >> $GITHUB_OUTPUT

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version || steps.get-python-version.outputs.version }}

    - name: Install Poetry
      shell: bash
      run: pipx install "poetry>=2.3,<3"

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry/cache
        key: pypoetry-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          pypoetry-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Install just
      if: hashFiles('justfile') != ''
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

    - name: Install graphviz
      if: runner.os == 'Linux'
      uses: tecolicom/actions-use-apt-tools@065d3fb036b7fc85487573596f97732ed0d3fce1 # v1.7
      with:
        tools: graphviz

    - name: Install dependencies
      if: hashFiles('justfile') != ''
      run: just install
      shell: bash
