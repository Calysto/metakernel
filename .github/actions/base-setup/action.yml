name: Base Setup
description: Install Python, Poetry (with OS-keyed cache), just, graphviz (Linux), and project dependencies

inputs:
  python-version:
    required: false
    default: ""
    description: "Python version to use (defaults to system Python if not specified)"

runs:
  using: composite
  steps:
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version || '' }}

    - name: Install Poetry
      shell: bash
      run: pipx install "poetry>=2.3,<3"

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry/cache
        key: pypoetry-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          pypoetry-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Install just
      if: hashFiles('justfile') != ''
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

    - name: Install graphviz
      if: runner.os == 'Linux'
      uses: tecolicom/actions-use-apt-tools@065d3fb036b7fc85487573596f97732ed0d3fce1 # v1.7
      with:
        tools: graphviz

    - name: Install dependencies
      if: hashFiles('justfile') != ''
      run: just install
      shell: bash
