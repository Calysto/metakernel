name: Test SDist
description: Downloads the sdist artifact, unpacks it, and runs the test suite

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true

    - uses: actions/download-artifact@v4
      with:
        name: Packages
        path: dist

    - name: Unpack sdist
      shell: bash
      run: |
        mkdir sdist_unpack
        tar xf dist/*.tar.gz --strip-components=1 -C sdist_unpack

    - name: Run tests
      shell: bash
      working-directory: sdist_unpack
      run: uv run pytest
