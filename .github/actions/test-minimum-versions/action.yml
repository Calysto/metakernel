name: Test Minimum Versions
description: Pins all dependencies to their minimum allowed versions and runs the test suite.
  Assumes base-setup has already been run.

inputs:
  command:
    required: false
    default: "just test"
    description: "Command to run the test suite"

runs:
  using: composite
  steps:
    - name: Force the use of minimum versions
      shell: bash
      run: |
        sed -i -E 's/"(\^|>=)([0-9])/"==\2/' pyproject.toml
        sed -i -E 's/requires-python = "==([0-9])/requires-python = ">=\1/' pyproject.toml
        poetry lock

    - name: Run tests
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
      run: $COMMAND
