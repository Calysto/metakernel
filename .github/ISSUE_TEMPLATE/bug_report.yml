name: Bug Report
description: Report a bug to help us improve MetaKernel
title: "[Bug] Short summary of the bug - Component"
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Do '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and tracebacks.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g., 3.11"
    validations:
      required: true

  - type: input
    id: metakernel-version
    attributes:
      label: MetaKernel Version
      placeholder: "e.g., 0.30.0"
    validations:
      required: true

  - type: input
    id: jupyter-version
    attributes:
      label: Jupyter Version
      placeholder: "e.g., JupyterLab 4.2"

  - type: input
    id: kernel
    attributes:
      label: Kernel Using MetaKernel
      placeholder: "e.g., Calysto Scheme, MetaKernel Python"

  - type: input
    id: kernel-version
    attributes:
      label: Kernel Version
      placeholder: "e.g., 0.1.0"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Logs
      description: If applicable, add screenshots or log output to help explain the problem.

  - type: dropdown
    id: severity
    attributes:
      label: Severity/Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
