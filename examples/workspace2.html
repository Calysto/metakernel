<td>

  <script>

      var workspace = Blockly.inject('blocklyDiv',
        {media: 'https://calysto.github.io/javascripts/blockly/media/',
         toolbox: document.getElementById('toolbox'),
         zoom: {enabled: true}
        });

      var xml_init = document.getElementById('workspace');
      // Restore saved workspace XML embedded at magic run time (fixes #170).
      (function() {
        function applyXml(xml) {
          try {
            Blockly.Xml.domToWorkspace(workspace,
              xml || xml_init ||
              Blockly.Xml.textToDom('<xml id="workspace"></xml>'));
          } catch(e) {}
        }
        try {
          var saved = window.__jigsaw_saved_xml__;
          if (saved) {
            applyXml(new DOMParser().parseFromString(saved, 'text/xml').documentElement);
          } else {
            applyXml(null);
          }
        } catch(e) { applyXml(null); }
      })();
  </script>
<script>
  // Use 4-space indentation for all Blockly code generators.
  (function() {
    var gens = ['Python', 'JavaScript', 'Java', 'Dart', 'Lua', 'PHP'];
    for (var i = 0; i < gens.length; i++) {
      if (Blockly[gens[i]]) Blockly[gens[i]].INDENT = '    ';
    }
  })();
  function _jigsaw_send(msg) {
    msg.msg_id = Math.random().toString(36).slice(2);
    try { window.parent.postMessage(msg, '*'); } catch(e) {}
    try {
      if (window.top !== window.parent) {
        window.top.postMessage(msg, '*');
      }
    } catch(e) {}
  }
  function _jigsaw_run(ws, lang, wf) {
    var code = Blockly[lang].workspaceToCode(ws);
    var xml  = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
    _jigsaw_send({type:'jigsaw', action:'execute',
      workspace_filename:wf, code:code, save_xml:xml});
  }
  function _jigsaw_insert(ws, lang, wf) {
    var code = Blockly[lang].workspaceToCode(ws);
    var xml  = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
    _jigsaw_send({type:'jigsaw', action:'insert',
      workspace_filename:wf, code:code, save_xml:xml});
  }
  function _jigsaw_clear(wf) {
    _jigsaw_send({type:'jigsaw', action:'clear', workspace_filename:wf});
  }
</script>
</body>
